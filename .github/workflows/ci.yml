name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: sqlite
            artifact: component-sqlite.wasm
          - name: sqlite-vec
            artifact: component-sqlite-vec.wasm
    steps:
      - uses: actions/checkout@v6
      - uses: moonrepo/setup-rust@v1
        with:
          channel: nightly
          bins: wit-deps-cli, just
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: bytecodealliance/setup-wasi-sdk-action@v1
      - run: just init
      - run: just build ${{ matrix.name }}
      - run: cp target/wasm32-wasip2/release/component_sqlite.wasm ${{ matrix.artifact }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.artifact }}

  e2e:
    name: E2E (${{ matrix.name }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: sqlite
            artifact: component-sqlite.wasm
            hurl: "e2e/*.hurl"
          - name: sqlite-vec
            artifact: component-sqlite-vec.wasm
            hurl: "e2e/*.hurl e2e/vec/*.hurl"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.name }}
      - uses: actcore/act-cli/setup@main
      - uses: moonrepo/setup-rust@v1
        with:
          bins: hurl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Test
        run: |
          DB_DIR=$(mktemp -d)
          act run --http --listen 3000 ${{ matrix.artifact }} --allow-dir "/data:$DB_DIR" &
          npx wait-on http://[::1]:3000/info
          hurl --test --variable "baseurl=http://[::1]:3000" --variable "db_path=/data/test.db" ${{ matrix.hurl }}

  clippy:
    name: Clippy (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: sqlite
          - name: sqlite-vec
    steps:
      - uses: actions/checkout@v6
      - uses: moonrepo/setup-rust@v1
        with:
          channel: nightly
          components: clippy
          bins: wit-deps-cli, just
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: bytecodealliance/setup-wasi-sdk-action@v1
      - run: just init
      - run: just clippy ${{ matrix.name }}

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: moonrepo/setup-rust@v1
        with:
          channel: nightly
          components: rustfmt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: cargo fmt -- --check

  publish:
    name: Publish (${{ matrix.name }})
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [e2e, clippy, fmt]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      id-token: write
      attestations: write
    strategy:
      matrix:
        include:
          - name: sqlite
          - name: sqlite-vec
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.name }}
      - run: mkdir -p target/wasm32-wasip2/release && mv component-*.wasm target/wasm32-wasip2/release/component_sqlite.wasm
      - uses: actcore/act-cli/setup@main
      - uses: oras-project/setup-oras@v1
      - uses: moonrepo/setup-rust@v1
        with:
          bins: just
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: echo ${{ secrets.GITHUB_TOKEN }} | oras login ghcr.io -u ${{ github.actor }} --password-stdin
      - run: just publish ${{ matrix.name }}
      - name: Attest
        uses: actions/attest@v4
        with:
          subject-path: target/wasm32-wasip2/release/component_sqlite.wasm
          push-to-registry: true
