[package]
name = "component-sqlite"
version = "0.1.0"
edition = "2024"

[dependencies]
act-sdk = "0.2.4"
wit-bindgen = { version = "0.54", features = ["async-spawn"] }
serde = { version = "1", features = ["derive"] }
schemars = "1"
serde_json = "1"
base64 = "0.22"
rusqlite = { version = "0.39.0", features = ["bundled"] }

[lib]
crate-type = ["cdylib"]
